services:
  app:
    container_name: legal-casebase
    build: .
    working_dir: /workspace
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - legal_casebase_storage:/workspace/storage
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  legal_casebase_storage: